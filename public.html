<!DOCTYPE html>
<html>
<head>
  <title>Public Movie Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <script>
    const role = localStorage.getItem('userRole');
    if (role !== 'public') {
      alert('Access denied! Only public users can access this page.');
      window.location.href = 'index.html';
    }
  </script>

  <div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="dashboard-title">🎬 Public Movie Dashboard</h2>
      <button class="btn btn-outline-dark" onclick="logout()">Logout</button>
    </div>

    <div class="card shadow">
      <div class="card-header bg-dark text-white">
        <h5 class="mb-0">Available Movies</h5>
      </div>
      <div class="card-body p-0">
        <table class="table table-hover mb-0">
          <thead class="table-light">
            <tr>
              <th>🎥 Title</th>
              <th>✍️ Director</th>
              <th>🎟️ Tickets</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="movieList"></tbody>
        </table>
        <p id="bookMessage" class="text-success p-3 fw-bold"></p>
      </div>
    </div>
  </div>

  <script>
    function logout() {
      localStorage.removeItem("userRole");
      window.location.href = "index.html";
    }

    // Function to load movies
    function loadMovies() {
      fetch("http://16.16.233.152:5000/movies")
        .then((res) => res.json())
        .then((movies) => {
          const list = document.getElementById("movieList");
          list.innerHTML = "";

          movies.forEach((movie) => {
            const row = document.createElement("tr");

            const tdTitle = document.createElement("td");
            tdTitle.textContent = movie.title;

            const tdDirector = document.createElement("td");
            tdDirector.textContent = movie.director;

            const tdTickets = document.createElement("td");
            tdTickets.textContent = movie.tickets;

            const tdAction = document.createElement("td");
            const btn = document.createElement("button");

            if (movie.tickets > 0) {
              btn.textContent = "Buy Ticket";
              btn.className = "btn btn-primary btn-sm";
              btn.onclick = () => bookTicket(movie._id);  // Call bookTicket function
            } else {
              btn.textContent = "Sold Out";
              btn.className = "btn btn-secondary btn-sm";
              btn.disabled = true;
            }

            tdAction.appendChild(btn);

            row.appendChild(tdTitle);
            row.appendChild(tdDirector);
            row.appendChild(tdTickets);
            row.appendChild(tdAction);

            list.appendChild(row);
          });
        })
        .catch((err) => {
          console.error("Load movies error:", err);
        });
    }

    // Function to book a ticket
    // Function to book a ticket
function bookTicket(id) {
  fetch(`http://16.16.233.152:5000/movies/${id}/book`, {
    method: "POST"
  })
    .then((res) => {
      if (!res.ok) throw new Error("Booking failed with status: " + res.status);
      return res.json();
    })
    .then((data) => {
      if (data.message === "Ticket booked successfully") {
        document.getElementById("bookMessage").textContent = "✅ " + data.message;
        loadMovies();  // Reload movies to show updated ticket count
      } else {
        document.getElementById("bookMessage").textContent = "❌ " + data.message;
      }
    })
    .catch((err) => {
      document.getElementById("bookMessage").textContent = "❌ Failed to book ticket: " + err.message;
    });
}


    // Initial Load
    loadMovies();
  </script>
</body>
</html>
